<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronómetro Dark Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="controls">
            <h2>CRONOMETRO</h2>
            <button id="startBtn" class="btn-start">Iniciar</button>
            <button id="captureBtn" class="btn-capture" disabled>Capturar</button>
            <button id="resetBtn" class="btn-reset">Reiniciar</button>
        </aside>

       <main class="timer-container">
    <div id="display">00:00.00</div>
    <div class="label">TIEMPO TRANSCURRIDO</div>
</main>

        <section class="results">
            <h3>Registros</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Tiempo</th>
                            <th>Dif.</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTable">
                        </tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
